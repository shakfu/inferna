name: _gpu-build-vulkan-macos-intel

# Reusable workflow: builds Vulkan wheels for vulkan-macos-intel-x86_64.
# Called by build-gpu-wheels.yml (stable) and build-gpu-wheels-abi3.yml (abi3).
# Do not invoke directly — `workflow_call` only.

on:
  workflow_call:
    inputs:
      wheel_kind:
        description: '"stable" | "abi3" — controls artifact + cache key prefix'
        type: string
        required: true
      cibw_version:
        description: 'cibuildwheel pin (e.g. 3.4.0 or 3.4.1)'
        type: string
        required: true
      cibw_build:
        description: 'CIBW_BUILD selector (e.g. "cp310-* ... cp314-*" or "cp312-*")'
        type: string
        required: true
      link_mode:
        description: '"dynamic" | "static"'
        type: string
        required: true
      enabled:
        description: 'Whether this backend should run'
        type: boolean
        required: true
      extra_cibw_env:
        description: 'Extra newline-separated KEY=VALUE pairs appended to CIBW_ENVIRONMENT_* (use "" for none)'
        type: string
        default: ""

jobs:
  build:
    if: inputs.enabled
    name: ${{ inputs.wheel_kind == 'abi3' && 'Vulkan abi3' || 'Vulkan' }} - vulkan-macos-intel-x86_64 (${{ inputs.link_mode }})
    runs-on: macos-15-intel
    env:
      CIBW_BUILD: ${{ inputs.cibw_build }}

    steps:
      # Fail fast on bad input values. workflow_call doesn't support
      # `choice` inputs, so we validate at run time. A typo in a caller
      # would otherwise silently fall through the
      # `${{ x == 'stable' && ... || ... }}` ternaries below.
      - name: Validate inputs
        shell: bash
        run: |
          case "${{ inputs.wheel_kind }}" in
            stable|abi3) ;;
            *) echo "::error::wheel_kind must be 'stable' or 'abi3', got '${{ inputs.wheel_kind }}'"; exit 1 ;;
          esac
          case "${{ inputs.link_mode }}" in
            dynamic|static) ;;
            *) echo "::error::link_mode must be 'dynamic' or 'static', got '${{ inputs.link_mode }}'"; exit 1 ;;
          esac
          if [[ ! "${{ inputs.cibw_version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::cibw_version must be X.Y.Z, got '${{ inputs.cibw_version }}'"; exit 1
          fi
          if [[ -z "${{ inputs.cibw_build }}" ]]; then
            echo "::error::cibw_build must not be empty"; exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache thirdparty deps
        id: cache-deps
        uses: actions/cache@v5
        with:
          path: thirdparty/
          key: deps-${{ inputs.wheel_kind == 'abi3' && 'abi3-' || '' }}vulkan-macos-intel-${{ inputs.link_mode }}-${{ hashFiles('scripts/manage.py', 'pyproject.toml', '.github/workflows/_gpu-build-vulkan-macos-intel.yml') }}

      - name: Install Vulkan SDK
        run: |
          brew install vulkan-headers vulkan-loader molten-vk shaderc spirv-headers
          SHADERC_BIN="$(brew --prefix shaderc)/bin"
          VULKAN_PREFIX="$(brew --prefix vulkan-loader)"
          echo "PATH=${SHADERC_BIN}:${PATH}" >> "$GITHUB_ENV"
          echo "VULKAN_SDK=${VULKAN_PREFIX}" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=$(brew --prefix vulkan-headers):$(brew --prefix vulkan-loader):$(brew --prefix molten-vk):$(brew --prefix spirv-headers)" >> "$GITHUB_ENV"
          ${SHADERC_BIN}/glslc --version

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install cibuildwheel
        run: pip install "cibuildwheel==${{ inputs.cibw_version }}"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-${{ inputs.wheel_kind == 'abi3' && 'abi3-' || '' }}vulkan-macos-intel-${{ inputs.link_mode }}
          evict-old-files: 1d

      - name: Build Vulkan wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS_MACOS: x86_64
          CIBW_BEFORE_BUILD_MACOS: >
            pip install delocate wheel &&
            cd {project} && python scripts/ci_rename_package.py inferna-vulkan &&
            cd {project} &&
            python scripts/manage.py build --all --deps-only --no-sd-examples
            ${{ inputs.link_mode == 'dynamic' && '--dynamic' || '' }} &&
            python scripts/manage.py write_build_config
          CIBW_ENVIRONMENT_MACOS: >
            MACOSX_DEPLOYMENT_TARGET=11.0
            GGML_VULKAN=1
            GGML_METAL=0
            GGML_NATIVE=OFF
            CMAKE_C_COMPILER_LAUNCHER=ccache
            CMAKE_CXX_COMPILER_LAUNCHER=ccache
            WITH_DYLIB=${{ inputs.link_mode == 'dynamic' && '1' || '0' }}
            SD_USE_VENDORED_GGML=${{ inputs.link_mode == 'dynamic' && '0' || '1' }}
            ${{ inputs.extra_cibw_env }}
          CIBW_TEST_COMMAND: ""
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}
            --exclude libvulkan
            --exclude libMoltenVK &&
            python {project}/scripts/manage.py fix_macos_vulkan_wheel {dest_dir}

      - name: List built wheels
        run: ls -lah wheelhouse/

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ inputs.wheel_kind == 'abi3' && 'abi3-' || '' }}vulkan-macos-intel-x86_64
          path: ./wheelhouse/*.whl


name: build-cibw

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: 'Upload wheels to GitHub Release'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Build wheels for ${{ matrix.os }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-intel
            runs-on: ubuntu-latest
          # - os: linux-arm
          #   runs-on: ubuntu-24.04-arm
          - os: windows-intel
            runs-on: windows-latest
          # - os: windows-arm
          #   runs-on: windows-11-arm
          - os: macos-intel
            # macos-15-intel is the last x86_64 runner
            runs-on: macos-15-intel
          - os: macos-arm
            # macos-14+ (including latest) are ARM64 runners
            runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Cache thirdparty deps
        id: cache-deps
        uses: actions/cache@v5
        with:
          path: thirdparty/
          key: deps-cibw2-${{ matrix.os }}-${{ hashFiles('scripts/manage.py', 'pyproject.toml', '.github/workflows/build-cibw.yml') }}

      - name: Set CCACHE_DIR to workspace
        if: runner.os != 'Windows'
        shell: bash
        run: echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> "$GITHUB_ENV"

      - name: ccache
        if: runner.os != 'Windows'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-cibw-${{ matrix.os }}
          evict-old-files: 1d

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_PLATFORM: ${{ matrix.platform || 'auto' }}
          CIBW_ARCHS: ${{ matrix.archs || 'auto' }}
          # Workflow-level CIBW_ENVIRONMENT_<PLAT> replaces (not merges
          # with) pyproject.toml's [tool.cibuildwheel.<plat>].environment,
          # so the pyproject defaults (GGML_*, MACOSX_DEPLOYMENT_TARGET)
          # must be re-declared here alongside the ccache launcher vars.
          # On Linux the workspace is bind-mounted to /project inside the
          # manylinux container, so CCACHE_DIR=/project/.ccache sees the
          # host ccache-action's cache. ccache itself is installed in
          # the container via pyproject.toml's before-all (yum install).
          CIBW_ENVIRONMENT_LINUX: >-
            GGML_METAL=0
            GGML_NATIVE=0
            CCACHE_DIR=/project/.ccache
            CCACHE_DEPEND=1
            CMAKE_C_COMPILER_LAUNCHER=ccache
            CMAKE_CXX_COMPILER_LAUNCHER=ccache
          CIBW_ENVIRONMENT_MACOS: >-
            MACOSX_DEPLOYMENT_TARGET=11.0
            GGML_METAL=1
            GGML_NATIVE=0
            CCACHE_DIR=${{ github.workspace }}/.ccache
            CCACHE_DEPEND=1
            CMAKE_C_COMPILER_LAUNCHER=ccache
            CMAKE_CXX_COMPILER_LAUNCHER=ccache

      - uses: actions/upload-artifact@v7
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  smoke_test:
    name: Smoke test on ${{ matrix.os }}
    needs: build_wheels
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-intel
            runs-on: ubuntu-latest
          - os: macos-arm
            runs-on: macos-latest
          - os: windows-intel
            runs-on: windows-latest

    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: wheels

      - name: Cache test model
        id: cache-model
        uses: actions/cache@v5
        with:
          path: models/Llama-3.2-1B-Instruct-Q8_0.gguf
          key: test-model-llama-3.2-1b-q8

      - name: Download test model
        if: steps.cache-model.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p models
          curl -sL https://huggingface.co/unsloth/Llama-3.2-1B-Instruct-GGUF/resolve/main/Llama-3.2-1B-Instruct-Q8_0.gguf \
            -o models/Llama-3.2-1B-Instruct-Q8_0.gguf

      - name: Find matching wheel
        id: find-wheel
        shell: bash
        run: |
          WHEEL=$(find wheels -name "*cp312*" | head -1)
          if [ -z "$WHEEL" ]; then
            WHEEL=$(find wheels -name "*.whl" | head -1)
          fi
          echo "wheel=$WHEEL" >> "$GITHUB_OUTPUT"
          echo "Found wheel: $WHEEL"

      - name: Install wheel in clean venv
        shell: bash
        run: |
          python -m venv smoke-venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            source smoke-venv/Scripts/activate
          else
            source smoke-venv/bin/activate
          fi
          pip install "${{ steps.find-wheel.outputs.wheel }}"

      - name: Smoke test - imports
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            source smoke-venv/Scripts/activate
          else
            source smoke-venv/bin/activate
          fi
          python -c "
          import inferna
          print(f'inferna {inferna.__version__} imported successfully')

          # Core API imports
          from inferna import LLM, complete, chat, AsyncLLM
          from inferna import batch_generate, BatchGenerator
          from inferna import estimate_gpu_layers, estimate_memory_usage
          from inferna import GenerationConfig, Response

          # Cython extension imports
          from inferna.llama import llama_cpp
          print('llama_cpp extension loaded')

          # Agent framework
          from inferna.agents import ReActAgent, ConstrainedAgent, ContractAgent, tool
          print('agents loaded')

          # Integrations
          from inferna.integrations.openai_compat import OpenAICompatibleClient
          print('integrations loaded')

          # Optional extensions (may not be built on all platforms)
          try:
              from inferna.whisper import whisper_cpp
              print('whisper_cpp extension loaded')
          except ImportError as e:
              print(f'whisper_cpp not available: {e}')

          try:
              from inferna.sd import stable_diffusion
              print('stable_diffusion extension loaded')
          except ImportError as e:
              print(f'stable_diffusion not available: {e}')

          print('All imports passed')
          "

      - name: Smoke test - inference
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            source smoke-venv/Scripts/activate
          else
            source smoke-venv/bin/activate
          fi
          python -c "
          from inferna import complete

          response = complete(
              'What is 2+2? Reply with just the number.',
              model_path='models/Llama-3.2-1B-Instruct-Q8_0.gguf',
              n_ctx=128,
              max_tokens=16,
          )
          print(f'Response: {response}')
          assert len(str(response).strip()) > 0, 'Empty response from model'
          print('Inference smoke test passed')
          "

  collect_wheels:
    name: Collect all wheels
    needs: build_wheels
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: cibw-wheels-*

      - name: Collect into single directory
        run: |
          mkdir -p dist
          find artifacts -name "*.whl" -exec cp {} dist/ \;
          echo "=== Collected wheels ==="
          ls -lh dist/

      - uses: actions/upload-artifact@v7
        with:
          name: inferna-wheels-all
          path: dist/*.whl

  upload_release:
    name: Upload wheels to GitHub Release
    needs: [collect_wheels, smoke_test]
    if: inputs.upload_release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download collected wheels
        uses: actions/download-artifact@v8
        with:
          name: inferna-wheels-all
          path: dist

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(python3 -c "
          import re
          text = open('pyproject.toml').read()
          print(re.search(r'^version\s*=\s*\"([^\"]+)\"', text, re.M).group(1))
          ")
          TAG="${VERSION}"
          echo "Version: ${VERSION}, Tag: ${TAG}"
          gh release create "${TAG}" --prerelease --title "inferna ${TAG}" 2>/dev/null || true
          gh release upload "${TAG}" dist/*.whl --clobber

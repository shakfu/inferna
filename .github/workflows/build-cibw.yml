name: build-cibw

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: 'Upload wheels to GitHub Release'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_wheels:
    name: Build wheels for ${{ matrix.os }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-intel
            runs-on: ubuntu-latest
          # - os: linux-arm
          #   runs-on: ubuntu-24.04-arm
          - os: windows-intel
            runs-on: windows-latest
          # - os: windows-arm
          #   runs-on: windows-11-arm
          - os: macos-intel
            # macos-15-intel is the last x86_64 runner
            runs-on: macos-15-intel
          - os: macos-arm
            # macos-14+ (including latest) are ARM64 runners
            runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Cache thirdparty deps
        id: cache-deps
        uses: actions/cache@v5
        with:
          path: thirdparty/
          key: deps-cibw2-${{ matrix.os }}-${{ hashFiles('scripts/manage.py', 'pyproject.toml', '.github/workflows/build-cibw.yml') }}

      - name: Set CCACHE_DIR to workspace
        if: runner.os != 'Windows'
        shell: bash
        run: echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> "$GITHUB_ENV"

      - name: ccache
        if: runner.os != 'Windows'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-cibw-${{ matrix.os }}
          evict-old-files: 1d

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_PLATFORM: ${{ matrix.platform || 'auto' }}
          CIBW_ARCHS: ${{ matrix.archs || 'auto' }}
          # ccache vars are set as runner-level env (below) and forwarded
          # into the manylinux container via CIBW_ENVIRONMENT_PASS_LINUX.
          # On macOS/Windows there's no container, so the runner env is
          # already visible to the build process. Pyproject's
          # [tool.cibuildwheel.<plat>].environment table remains the
          # canonical source for GGML_*, MACOSX_DEPLOYMENT_TARGET, etc.
          CIBW_ENVIRONMENT_PASS_LINUX: >-
            CCACHE_DIR
            CCACHE_DEPEND
            CMAKE_C_COMPILER_LAUNCHER
            CMAKE_CXX_COMPILER_LAUNCHER
          # Linux runs inside the manylinux container; the workspace is
          # bind-mounted to /project, so /project/.ccache resolves to the
          # ccache-action cache on the host. macOS uses the workspace
          # path directly. Both are set unconditionally — the unused one
          # is harmless on the other platform.
          CCACHE_DIR: ${{ runner.os == 'Linux' && '/project/.ccache' || format('{0}/.ccache', github.workspace) }}
          CCACHE_DEPEND: 1
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache

      - uses: actions/upload-artifact@v7
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  smoke_test:
    name: Smoke test on ${{ matrix.os }}
    needs: build_wheels
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-intel
            runs-on: ubuntu-latest
          - os: macos-arm
            runs-on: macos-latest
          - os: macos-intel
            runs-on: macos-15-intel
          - os: windows-intel
            runs-on: windows-latest

    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: wheels

      - name: Cache test model
        id: cache-model
        uses: actions/cache@v5
        with:
          path: models/Llama-3.2-1B-Instruct-Q8_0.gguf
          key: test-model-llama-3.2-1b-q8

      - name: Download test model
        if: steps.cache-model.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p models
          curl -sL https://huggingface.co/unsloth/Llama-3.2-1B-Instruct-GGUF/resolve/main/Llama-3.2-1B-Instruct-Q8_0.gguf \
            -o models/Llama-3.2-1B-Instruct-Q8_0.gguf

      - name: Find matching wheel
        id: find-wheel
        shell: bash
        run: |
          # Smoke job runs on Python 3.12, so the cp312 wheel must exist.
          # Falling back to any other version's wheel would just fail at
          # `pip install` (incompatible tag), so make the missing-wheel
          # case fail loudly here instead.
          WHEEL=$(find wheels -name "*cp312*" | head -1)
          if [ -z "$WHEEL" ]; then
            echo "ERROR: no cp312 wheel found in wheels/"
            ls -la wheels/
            exit 1
          fi
          echo "wheel=$WHEEL" >> "$GITHUB_OUTPUT"
          echo "Found wheel: $WHEEL"

      - name: Install wheel in clean venv
        shell: bash
        run: |
          python -m venv smoke-venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            source smoke-venv/Scripts/activate
          else
            source smoke-venv/bin/activate
          fi
          pip install "${{ steps.find-wheel.outputs.wheel }}"

      # Source checkout — needed both for the centralized smoke script
      # (scripts/ci_smoke.py) and the pytest run further down.
      - uses: actions/checkout@v6
        with:
          path: src-checkout

      - name: Smoke test - imports
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            source smoke-venv/Scripts/activate
          else
            source smoke-venv/bin/activate
          fi
          python src-checkout/scripts/ci_smoke.py

      - name: Smoke test - inference
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            source smoke-venv/Scripts/activate
          else
            source smoke-venv/bin/activate
          fi
          python -c "
          from inferna import complete

          response = complete(
              'What is 2+2? Reply with just the number.',
              model_path='models/Llama-3.2-1B-Instruct-Q8_0.gguf',
              n_ctx=128,
              max_tokens=16,
          )
          print(f'Response: {response}')
          assert len(str(response).strip()) > 0, 'Empty response from model'
          print('Inference smoke test passed')
          "

      - name: Run pytest against installed wheel
        shell: bash
        # pytest -x bails on first failure to keep CI fast on a smoke run.
        # We move models into the checkout so conftest fixtures find them.
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            source smoke-venv/Scripts/activate
          else
            source smoke-venv/bin/activate
          fi
          pip install pytest pytest-asyncio pytest-mock
          mkdir -p src-checkout/models
          cp models/Llama-3.2-1B-Instruct-Q8_0.gguf src-checkout/models/
          cd src-checkout
          # Drop tests that need extra fixtures the smoke env doesn't have
          # (whisper/sd models, qdrant, etc.). The core api/agents/batching
          # suite is the safety net we want against regressions.
          pytest -x -q --no-header \
            -o pythonpath= \
            tests/test_generate.py \
            tests/test_chat.py \
            tests/test_batching.py \
            tests/test_context.py \
            tests/test_params.py \
            tests/test_model.py

  collect_wheels:
    name: Collect all wheels
    needs: build_wheels
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: cibw-wheels-*

      - name: Collect into single directory
        run: |
          mkdir -p dist
          find artifacts -name "*.whl" -exec cp {} dist/ \;
          echo "=== Collected wheels ==="
          ls -lh dist/

      - uses: actions/upload-artifact@v7
        with:
          name: inferna-wheels-all
          path: dist/*.whl

  upload_release:
    name: Upload wheels to GitHub Release
    needs: [collect_wheels, smoke_test]
    if: inputs.upload_release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download collected wheels
        uses: actions/download-artifact@v8
        with:
          name: inferna-wheels-all
          path: dist

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(python3 -c "
          import re
          text = open('pyproject.toml').read()
          print(re.search(r'^version\s*=\s*\"([^\"]+)\"', text, re.M).group(1))
          ")
          TAG="${VERSION}"
          echo "Version: ${VERSION}, Tag: ${TAG}"
          (gh release view "${TAG}" >/dev/null 2>&1 && echo "Release ${TAG} already exists") || gh release create "${TAG}" --prerelease --title "inferna ${TAG}"
          gh release upload "${TAG}" dist/*.whl --clobber

name: _gpu-build-sycl

# Reusable workflow: builds SYCL wheels for sycl-linux-x86_64.
# Called by build-gpu-wheels.yml (stable) and build-gpu-wheels-abi3.yml (abi3).
# Do not invoke directly — `workflow_call` only.

on:
  workflow_call:
    inputs:
      wheel_kind:
        description: '"stable" | "abi3" — controls artifact + cache key prefix'
        type: string
        required: true
      cibw_version:
        description: 'cibuildwheel pin (e.g. 3.4.0 or 3.4.1)'
        type: string
        required: true
      cibw_build:
        description: 'CIBW_BUILD selector (e.g. "cp310-* ... cp314-*" or "cp312-*")'
        type: string
        required: true
      link_mode:
        description: '"dynamic" | "static"'
        type: string
        required: true
      enabled:
        description: 'Whether this backend should run'
        type: boolean
        required: true
      extra_cibw_env:
        description: 'Extra newline-separated KEY=VALUE pairs appended to CIBW_ENVIRONMENT_* (use "" for none)'
        type: string
        default: ""

jobs:
  build:
    if: inputs.enabled
    name: ${{ inputs.wheel_kind == 'abi3' && 'SYCL abi3' || 'SYCL' }} - sycl-linux-x86_64 (${{ inputs.link_mode }})
    runs-on: ubuntu-22.04
    env:
      CIBW_BUILD: ${{ inputs.cibw_build }}

    steps:
      # Fail fast on bad input values. workflow_call doesn't support
      # `choice` inputs, so we validate at run time. A typo in a caller
      # would otherwise silently fall through the
      # `${{ x == 'stable' && ... || ... }}` ternaries below.
      - name: Validate inputs
        shell: bash
        run: |
          case "${{ inputs.wheel_kind }}" in
            stable|abi3) ;;
            *) echo "::error::wheel_kind must be 'stable' or 'abi3', got '${{ inputs.wheel_kind }}'"; exit 1 ;;
          esac
          case "${{ inputs.link_mode }}" in
            dynamic|static) ;;
            *) echo "::error::link_mode must be 'dynamic' or 'static', got '${{ inputs.link_mode }}'"; exit 1 ;;
          esac
          if [[ ! "${{ inputs.cibw_version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::cibw_version must be X.Y.Z, got '${{ inputs.cibw_version }}'"; exit 1
          fi
          if [[ -z "${{ inputs.cibw_build }}" ]]; then
            echo "::error::cibw_build must not be empty"; exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache thirdparty deps
        id: cache-deps
        uses: actions/cache@v5
        with:
          path: thirdparty/
          key: deps-${{ inputs.wheel_kind == 'abi3' && 'abi3-' || '' }}sycl-${{ inputs.link_mode }}-${{ hashFiles('scripts/manage.py', 'pyproject.toml', '.github/workflows/_gpu-build-sycl.yml') }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install cibuildwheel
        run: pip install "cibuildwheel==${{ inputs.cibw_version }}"

      - name: Set CCACHE_DIR to workspace
        run: echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> "$GITHUB_ENV"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-${{ inputs.wheel_kind == 'abi3' && 'abi3-' || '' }}sycl-${{ inputs.link_mode }}
          evict-old-files: 1d

      - name: Build SYCL wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS_LINUX: x86_64
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: >
            dnf install -y git epel-release &&
            dnf install -y ccache &&
            rpm --import https://yum.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB &&
            dnf config-manager --add-repo https://yum.repos.intel.com/oneapi &&
            dnf install -y intel-oneapi-dpcpp-cpp-2025.3 intel-oneapi-mkl-devel-2025.3 &&
            if [ -f /project/thirdparty/.deps-complete ]; then echo "=== Deps cached, skipping build ==="; exit 0; fi &&
            CI_PYTHON=$(ls -d /opt/python/cp3*/bin | head -1) &&
            $CI_PYTHON/pip install cmake ninja &&
            source /opt/intel/oneapi/setvars.sh &&
            export CC=icx CXX=icpx &&
            PATH=$CI_PYTHON:$PATH
            CCACHE_DIR=/project/.ccache
            CMAKE_C_COMPILER_LAUNCHER=ccache
            CMAKE_CXX_COMPILER_LAUNCHER=ccache
            GGML_NATIVE=OFF GGML_SYCL=1 GGML_METAL=0
            SD_USE_VENDORED_GGML=${{ inputs.link_mode == 'dynamic' && '0' || '1' }}
            $CI_PYTHON/python scripts/manage.py build --all --deps-only --no-sd-examples
            ${{ inputs.link_mode == 'dynamic' && '--dynamic' || '' }} &&
            touch /project/thirdparty/.deps-complete
          CIBW_BEFORE_BUILD_LINUX: >
            cd {project} && python scripts/ci_rename_package.py inferna-sycl &&
            cd {project} && python scripts/manage.py write_build_config
          CIBW_ENVIRONMENT_LINUX: >
            GGML_NATIVE=OFF
            GGML_SYCL=1
            GGML_METAL=0
            CC=icx
            CXX=icpx
            PATH=/opt/intel/oneapi/compiler/latest/bin:$PATH
            LD_LIBRARY_PATH=/opt/intel/oneapi/compiler/latest/lib:/opt/intel/oneapi/mkl/latest/lib:$LD_LIBRARY_PATH
            CFLAGS=-s
            CXXFLAGS=-s
            CCACHE_DIR=/project/.ccache
            CMAKE_C_COMPILER_LAUNCHER=ccache
            CMAKE_CXX_COMPILER_LAUNCHER=ccache
            WITH_DYLIB=${{ inputs.link_mode == 'dynamic' && '1' || '0' }}
            SD_USE_VENDORED_GGML=${{ inputs.link_mode == 'dynamic' && '0' || '1' }}
            ${{ inputs.extra_cibw_env }}
          CIBW_TEST_COMMAND: ""
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            test -d {project}/thirdparty/llama.cpp/dynamic || { echo "ERROR: dynamic lib dir missing: {project}/thirdparty/llama.cpp/dynamic"; exit 1; } &&
            LD_LIBRARY_PATH={project}/thirdparty/llama.cpp/dynamic:$LD_LIBRARY_PATH
            auditwheel repair -w {dest_dir} {wheel}
            --plat manylinux_2_35_x86_64
            --exclude libsycl.so.8
            --exclude libOpenCL.so.1
            --exclude libsvml.so
            --exclude libimf.so
            --exclude libintlc.so.5
            --exclude libtbb.so.12
            --exclude libgomp.so.1

      - name: List built wheels
        run: ls -lah wheelhouse/

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ inputs.wheel_kind == 'abi3' && 'abi3-' || '' }}sycl-linux-x86_64
          path: ./wheelhouse/*.whl


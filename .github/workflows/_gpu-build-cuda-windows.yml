name: _gpu-build-cuda-windows

# Reusable workflow: builds CUDA 12.4 wheels for cuda-windows-x86_64.
# Called by build-gpu-wheels.yml (stable) and build-gpu-wheels-abi3.yml (abi3).
# Do not invoke directly — `workflow_call` only.

on:
  workflow_call:
    inputs:
      wheel_kind:
        description: '"stable" | "abi3" — controls artifact + cache key prefix'
        type: string
        required: true
      cibw_version:
        description: 'cibuildwheel pin (e.g. 3.4.0 or 3.4.1)'
        type: string
        required: true
      cibw_build:
        description: 'CIBW_BUILD selector (e.g. "cp310-* ... cp314-*" or "cp312-*")'
        type: string
        required: true
      link_mode:
        description: '"dynamic" | "static"'
        type: string
        required: true
      enabled:
        description: 'Whether this backend should run'
        type: boolean
        required: true
      extra_cibw_env:
        description: 'Extra newline-separated KEY=VALUE pairs appended to CIBW_ENVIRONMENT_* (use "" for none)'
        type: string
        default: ""

jobs:
  build:
    if: inputs.enabled
    name: ${{ inputs.wheel_kind == 'abi3' && 'CUDA 12.4 abi3' || 'CUDA 12.4' }} - cuda-windows-x86_64 (${{ inputs.link_mode }})
    runs-on: windows-latest
    env:
      CIBW_BUILD: ${{ inputs.cibw_build }}

    steps:
      # Fail fast on bad input values. workflow_call doesn't support
      # `choice` inputs, so we validate at run time. A typo in a caller
      # would otherwise silently fall through the
      # `${{ x == 'stable' && ... || ... }}` ternaries below.
      - name: Validate inputs
        shell: bash
        run: |
          case "${{ inputs.wheel_kind }}" in
            stable|abi3) ;;
            *) echo "::error::wheel_kind must be 'stable' or 'abi3', got '${{ inputs.wheel_kind }}'"; exit 1 ;;
          esac
          case "${{ inputs.link_mode }}" in
            dynamic|static) ;;
            *) echo "::error::link_mode must be 'dynamic' or 'static', got '${{ inputs.link_mode }}'"; exit 1 ;;
          esac
          if [[ ! "${{ inputs.cibw_version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::cibw_version must be X.Y.Z, got '${{ inputs.cibw_version }}'"; exit 1
          fi
          if [[ -z "${{ inputs.cibw_build }}" ]]; then
            echo "::error::cibw_build must not be empty"; exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache thirdparty deps
        id: cache-deps
        uses: actions/cache@v5
        with:
          path: thirdparty/
          key: deps-${{ inputs.wheel_kind == 'abi3' && 'abi3-' || '' }}cuda-windows-${{ inputs.link_mode }}-${{ hashFiles('scripts/manage.py', 'pyproject.toml', '.github/workflows/_gpu-build-cuda-windows.yml') }}

      - name: Install CUDA Toolkit 12.4
        uses: Jimver/cuda-toolkit@v0.2.21
        id: cuda-toolkit
        with:
          cuda: '12.4.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "visual_studio_integration"]'

      - name: Verify CUDA installation
        shell: bash
        run: |
          echo "CUDA_PATH=$CUDA_PATH"
          nvcc --version
          ls "$CUDA_PATH/lib/x64/" | head -20

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install cibuildwheel
        run: pip install "cibuildwheel==${{ inputs.cibw_version }}"

      - name: Build CUDA wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_BEFORE_BUILD_WINDOWS: >
            pip install delvewheel &&
            python -c "import os; t=open('pyproject.toml').read(); open('pyproject.toml','w').write(t.replace('name = \"inferna\"','name = \"inferna-cuda12\"',1))" &&
            python -c "t=open('pyproject.toml').read(); assert 'name = \"inferna-cuda12\"' in t, 'rename failed'" &&
            cd {project} &&
            python scripts/manage.py build --all --deps-only --no-sd-examples
            ${{ inputs.link_mode == 'dynamic' && '--dynamic' || '' }} &&
            python scripts/manage.py write_build_config
          CIBW_ENVIRONMENT_WINDOWS: >
            GGML_CUDA=1
            GGML_METAL=0
            GGML_NATIVE=OFF
            CMAKE_CUDA_ARCHITECTURES="75"
            WITH_DYLIB=${{ inputs.link_mode == 'dynamic' && '1' || '0' }}
            SD_USE_VENDORED_GGML=${{ inputs.link_mode == 'dynamic' && '0' || '1' }}
            ${{ inputs.extra_cibw_env }}
          CIBW_TEST_COMMAND: ""
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
            delvewheel repair -w {dest_dir} {wheel}
            --add-path {project}\thirdparty\llama.cpp\dynamic
            --add-path {project}\thirdparty\whisper.cpp\dynamic
            --add-path {project}\thirdparty\stable-diffusion.cpp\dynamic
            --include ggml-cuda.dll
            --no-dll nvcuda.dll
            --no-dll cudart64_12.dll
            --no-dll cublas64_12.dll
            --no-dll cublasLt64_12.dll

      - name: List built wheels
        shell: bash
        run: ls -lah wheelhouse/

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ inputs.wheel_kind == 'abi3' && 'abi3-' || '' }}cuda-windows-x86_64
          path: ./wheelhouse/*.whl


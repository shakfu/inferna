name: build-new-wheels

permissions:
  contents: read

# Staging workflow for new GPU wheel variants. Single-Python build (cp312)
# for fast iteration; variants proven here get promoted to
# `build-gpu-wheels.yml` for the full cp310-cp314 matrix.

on:
  workflow_dispatch:
    inputs:
      link_mode:
        description: 'Linking mode'
        required: true
        default: 'dynamic'
        type: choice
        options:
          - dynamic
          - static
      cuda13_windows:
        description: 'Build CUDA 13.1 Windows (x86_64)'
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.link_mode }}
  cancel-in-progress: true

env:
  CIBW_BUILD_VERBOSITY: 1
  CIBW_BUILD: "cp312-*"
  CIBW_SKIP: "*-musllinux_* *-win32 *-manylinux_i686"

jobs:
  # ---------------------------------------------------------------------------
  # CUDA 13.1 - Windows (x86_64)
  # Uses NVIDIA CUDA Toolkit 13.1. delvewheel handles wheel repair.
  # Upstream llama.cpp ships `llama-*-bin-win-cuda-13.1-x64.zip` alongside the
  # 12.4 variant. This variant targets Blackwell/Ada users; CUDA 12.4 is
  # handled by `build-gpu-wheels.yml`.
  # ---------------------------------------------------------------------------
  build_cuda13_windows:
    name: CUDA 13.1 - Windows (${{ inputs.link_mode }})
    if: inputs.cuda13_windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache thirdparty deps
        id: cache-deps
        uses: actions/cache@v5
        with:
          path: thirdparty/
          key: deps-cuda13-windows-${{ inputs.link_mode }}-${{ hashFiles('scripts/manage.py', '.github/workflows/build-new-wheels.yml') }}

      - name: Install CUDA Toolkit 13.1
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: '13.1.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "visual_studio_integration"]'

      - name: Verify CUDA installation
        shell: bash
        run: |
          echo "CUDA_PATH=$CUDA_PATH"
          nvcc --version
          ls "$CUDA_PATH/lib/x64/" | head -20

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install cibuildwheel
        run: pip install cibuildwheel==3.4.0

      - name: Build CUDA wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_BEFORE_BUILD_WINDOWS: >
            pip install delvewheel &&
            python -c "import os; t=open('pyproject.toml').read(); open('pyproject.toml','w').write(t.replace('name = \"inferna\"','name = \"inferna-cuda13\"',1))" &&
            python -c "t=open('pyproject.toml').read(); assert 'name = \"inferna-cuda13\"' in t, 'rename failed'" &&
            cd {project} &&
            set LLAMACPP_CUDA_RELEASE=13.1 &&
            python scripts/manage.py build --all --deps-only --no-sd-examples
            ${{ inputs.link_mode == 'dynamic' && '--dynamic' || '' }} &&
            python scripts/manage.py write_build_config
          CIBW_ENVIRONMENT_WINDOWS: >
            GGML_CUDA=1
            GGML_METAL=0
            GGML_NATIVE=OFF
            CMAKE_CUDA_ARCHITECTURES="75;89;120"
            LLAMACPP_CUDA_RELEASE=13.1
            WITH_DYLIB=${{ inputs.link_mode == 'dynamic' && '1' || '0' }}
            SD_USE_VENDORED_GGML=${{ inputs.link_mode == 'dynamic' && '0' || '1' }}
          CIBW_TEST_COMMAND: ""
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
            delvewheel repair -w {dest_dir} {wheel}
            --add-path {project}\thirdparty\llama.cpp\dynamic
            --add-path {project}\thirdparty\whisper.cpp\dynamic
            --add-path {project}\thirdparty\stable-diffusion.cpp\dynamic
            --include ggml-cuda.dll
            --no-dll nvcuda.dll
            --no-dll cudart64_13.dll
            --no-dll cublas64_13.dll
            --no-dll cublasLt64_13.dll

      - name: List built wheels
        shell: bash
        run: ls -lah wheelhouse/

      - name: Inspect wheel contents
        shell: bash
        run: |
          for whl in wheelhouse/*.whl; do
            echo "=== $whl ==="
            python -m zipfile -l "$whl"
            echo ""
          done

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-cuda13-windows
          path: ./wheelhouse/*.whl
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Import smoke test (no GPU required)
  # ---------------------------------------------------------------------------
  smoke_test:
    name: Smoke test - ${{ matrix.platform }}
    needs: [build_cuda13_windows]
    if: always() && !cancelled() && needs.build_cuda13_windows.result == 'success'
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: cuda13-windows
            runs-on: windows-latest
            artifact: wheels-cuda13-windows
            condition: inputs.cuda13_windows

    steps:
      - name: Check if platform was built
        id: check
        shell: bash
        run: |
          if [ "${{ matrix.condition }}" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v6
        if: steps.check.outputs.skip != 'true'
        with:
          python-version: "3.12"

      - name: Download wheel artifacts
        if: steps.check.outputs.skip != 'true'
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: wheels

      - name: Find matching wheel
        if: steps.check.outputs.skip != 'true'
        id: find-wheel
        shell: bash
        run: |
          WHEEL=$(find wheels -name "*cp312*" | head -1)
          if [ -z "$WHEEL" ]; then
            WHEEL=$(find wheels -name "*.whl" | head -1)
          fi
          echo "wheel=$WHEEL" >> "$GITHUB_OUTPUT"
          echo "Found wheel: $WHEEL"

      - name: Install wheel in clean venv
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: |
          python -m venv smoke-venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            source smoke-venv/Scripts/activate
          else
            source smoke-venv/bin/activate
          fi
          pip install "${{ steps.find-wheel.outputs.wheel }}"

      - name: Smoke test - imports
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            source smoke-venv/Scripts/activate
          else
            source smoke-venv/bin/activate
          fi
          python -c "
          import inferna
          print(f'inferna {inferna.__version__} imported successfully')

          from inferna import LLM, complete, chat
          from inferna.llama import llama_cpp
          print('llama_cpp extension loaded')

          from inferna.agents import ReActAgent, ConstrainedAgent, ContractAgent, tool
          print('agents loaded')

          try:
              from inferna.whisper import whisper_cpp
              print('whisper_cpp extension loaded')
          except ImportError as e:
              print(f'whisper_cpp not available: {e}')

          try:
              from inferna.sd import stable_diffusion
              print('stable_diffusion extension loaded')
          except ImportError as e:
              print(f'stable_diffusion not available: {e}')

          print('All imports passed')
          "

      - name: Smoke test - inferna info
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            source smoke-venv/Scripts/activate
          else
            source smoke-venv/bin/activate
          fi
          inferna info
